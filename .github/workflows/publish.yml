name: Publish

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Ensure modern npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: CLI smoke test
        run: npm run smoke

      - name: Detect release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG="v${PACKAGE_VERSION}"
          NPM_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || true)

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [ "$PACKAGE_VERSION" = "$NPM_VERSION" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Package version $PACKAGE_VERSION is already published"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "Package version $PACKAGE_VERSION will be published"
          fi

      - name: Create git tag
        if: steps.version.outputs.should_publish == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.version.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
            exit 0
          fi
          gh release create "$TAG" --generate-notes --title "$TAG"

      - name: Publish to npm
        if: steps.version.outputs.should_publish == 'true'
        run: npm publish --access public
